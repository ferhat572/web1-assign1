<!DOCTYPE html>
<html lang="en">
<head>
    <!-- I use the head section to give information about my page. The title shows in the browser tab. -->
    <meta charset="UTF-8">
    <title>My HTML Notes</title>
</head>
<body>
    <!-- I use the nav tag to define a navigation menu that allows moving between pages -->
    <nav>
        <a href="index.html">Home</a> | <a href="notes.html">Notes</a>
    </nav>

    <!-- I use the h1 tag to provide a main heading for my page -->
    <h1>My HTML Notes</h1>

    <!-- This list presents the 5 HTML tags I have learned and their descriptions -->
    <dl>
        <dt>&lt;header&gt;</dt>
        <dd>Defines the header for a document or section.</dd>
        <dt>&lt;nav&gt;</dt>
        <dd>Defines a block of navigation links.</dd>
        <dt>&lt;main&gt;</dt>
        <dd>Specifies the main content of a document.</dd>
        <dt>&lt;article&gt;</dt>
        <dd>Specifies independent, self-contained content.</dd>
        <dt>&lt;footer&gt;</dt>
        <dd>Defines the footer for a document or section.</dd>
    </dl>
</body>
</html>
